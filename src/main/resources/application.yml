server:
  port: 8080

spring:
  datasource:
    url: ${DB_URL:jdbc:sqlserver://localhost:1433;databaseName=finance;encrypt=true;trustServerCertificate=true}
    username: ${DB_USER:sa}
    password: ${DB_PASSWORD:YourStrong!Passw0rd}
    driver-class-name: com.microsoft.sqlserver.jdbc.SQLServerDriver
  jpa:
    hibernate:
      ddl-auto: none
    show-sql: false

flyway:
  enabled: true
  locations: classpath:db/migration

activemq:
  broker-url: ${ACTIVEMQ_BROKER_URL:tcp://activemq:61616}

keycloak:
  auth-server-url: ${KEYCLOAK_URL:http://localhost:8081}
  realm: ${KEYCLOAK_REALM:finance-dev}
  resource: ${KEYCLOAK_CLIENT:finance-client}

management:
  endpoints:
    web:
      exposure:
        include: health,info
