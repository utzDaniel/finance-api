server:
  port: 8082
  error:
    include-message: always
    include-binding-errors: always

spring:
  application:
    name: ficance-api
  mvc:
    throw-exception-if-no-handler-found: true
  web:
    resources:
      add-mappings: false
  datasource:
    url: ${DB_URL:jdbc:sqlserver://localhost:1433;databaseName=finance;encrypt=true;trustServerCertificate=true}
    username: ${DB_USER:sa}
    password: ${DB_PASSWORD:YourStrong!Passw0rd}
    driver-class-name: com.microsoft.sqlserver.jdbc.SQLServerDriver
  jpa:
    hibernate:
      ddl-auto: none
    show-sql: false
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
    baseline-version: 0
  activemq:
    broker-url: ${ACTIVEMQ_URL:tcp://localhost:61616}

keycloak:
  url: ${KEYCLOAK_URL:http://localhost:9999}
  realm: ${KEYCLOAK_REALM:development}

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: always
      probes:
        enabled: false
  health:
    diskspace:
      enabled: false
    ping:
      enabled: false
    ssl:
      enabled: false

